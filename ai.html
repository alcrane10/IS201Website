<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blue Tic Tac Toe</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #dbeafe, #93c5fd);
      margin-top: 40px;
    }

    h1 {
      font-size: 42px;
      color: #1e3a8a;
      letter-spacing: 1px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 12px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #eff6ff;
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }

    .cell:hover {
      background: #dbeafe;
      transform: scale(1.05);
    }

    .cell:active {
      transform: scale(0.95);
    }

    .cell.X {
      color: #2563eb;
      text-shadow: 0 0 8px rgba(37, 99, 235, 0.6);
    }

    .cell.O {
      color: #1e40af;
      text-shadow: 0 0 8px rgba(30, 64, 175, 0.6);
    }

    #status {
      margin-top: 25px;
      font-size: 24px;
      color: #1e3a8a;
      font-weight: 500;
    }

    button {
      margin-top: 25px;
      padding: 12px 26px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
      transition: all 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div class="board" id="board"></div>

  <div id="status">Your turn (X)</div>

  <button onclick="resetGame()">Restart Game</button>

  <script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let gameOver = false;

    const boardElement = document.getElementById("board");
    const statusText = document.getElementById("status");

    function createBoard() {
      boardElement.innerHTML = "";
      board.forEach((cell, index) => {
        const div = document.createElement("div");
        div.classList.add("cell");
        if (cell) div.classList.add(cell);
        div.innerText = cell;
        div.addEventListener("click", () => playerMove(index));
        boardElement.appendChild(div);
      });
    }

    function playerMove(index) {
      if (board[index] !== "" || gameOver) return;

      board[index] = "X";
      createBoard();

      if (checkWinner("X")) {
        statusText.innerText = "🎉 You win!";
        gameOver = true;
        return;
      }

      if (!board.includes("")) {
        statusText.innerText = "It's a tie!";
        gameOver = true;
        return;
      }

      statusText.innerText = "Computer thinking...";
      setTimeout(computerMove, 500);
    }

    function computerMove() {
      if (gameOver) return;

      let emptyIndexes = board
        .map((val, idx) => val === "" ? idx : null)
        .filter(val => val !== null);

      let randomIndex = emptyIndexes[Math.floor(Math.random() * emptyIndexes.length)];
      board[randomIndex] = "O";

      createBoard();

      if (checkWinner("O")) {
        statusText.innerText = "😢 Computer wins!";
        gameOver = true;
        return;
      }

      if (!board.includes("")) {
        statusText.innerText = "It's a tie!";
        gameOver = true;
        return;
      }

      statusText.innerText = "Your turn (X)";
    }

    function checkWinner(player) {
      const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];

      return winPatterns.some(pattern => {
        const [a, b, c] = pattern;
        return board[a] === player &&
               board[b] === player &&
               board[c] === player;
      });
    }

    function resetGame() {
      board = ["", "", "", "", "", "", "", "", ""];
      gameOver = false;
      statusText.innerText = "Your turn (X)";
      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
